<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kodafriq Campaign</title>
    <script type="text/javascript">
      // Fix GitHub Pages trailing slash issue
      (function() {
        var l = window.location;
        if (l.hostname.indexOf('github.io') > -1 && !l.pathname.endsWith('/') && !l.pathname.endsWith('.html')) {
          l.replace(l.pathname + '/' + l.search + l.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
